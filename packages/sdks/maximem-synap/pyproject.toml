[build-system]
requires = ["setuptools>=77.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap"
version = "0.2.6"
description = "Python SDK for MaximemSynap context management system"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "MaximemSynap Team"}
]
keywords = ["context", "memory", "ai", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pydantic>=2.0",
    "cryptography>=41.0",
    "httpx>=0.25.0",
    "grpcio>=1.60.0",
]

[project.optional-dependencies]
postgres = [
    "psycopg2-binary>=2.9.0",
    "pyyaml>=6.0",
]
vector = [
    "chromadb>=0.4.0",
    "pyyaml>=6.0",
]
graph = [
    "neo4j>=5.0.0",
    "pyyaml>=6.0",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "mypy>=1.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/maximem-synap/sdk-python"
Documentation = "https://docs.synap.example.com"
Repository = "https://github.com/maximem-synap/sdk-python"

[tool.setuptools.packages.find]
where = ["."]
include = ["maximem_synap*"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.ruff]
line-length = 88
target-version = "py38"

[tool.pytest.ini_options]
testpaths = ["../../tests/sdk"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
