[project]
name = "maximem-synap-mcp-server"
version = "0.1.0"
description = "Hosted remote MCP server (Streamable HTTP) adapter over the Synap public REST API."
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.26.0",
    "httpx>=0.27",
    "uvicorn>=0.30",
    "starlette>=0.37",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "respx>=0.21"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["synap_mcp_server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
