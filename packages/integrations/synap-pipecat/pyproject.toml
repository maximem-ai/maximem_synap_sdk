[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap-pipecat"
version = "0.2.1"
description = "Synap memory integration for Pipecat — voice-pipeline context injection + conversation recording"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    {name = "Synap Team"}
]
keywords = ["synap", "memory", "pipecat", "voice", "ai", "agents"]

dependencies = [
    "maximem-synap>=0.2.0",
    "maximem-synap-integrations-common>=0.1.0",
    "pipecat-ai>=0.0.80",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["synap_pipecat*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
