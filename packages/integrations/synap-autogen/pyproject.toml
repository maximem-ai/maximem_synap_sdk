[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap-autogen"
version = "0.1.2"
description = "Synap memory integration for AutoGen / AG2"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["maximem-synap>=0.2.0", "maximem-synap-integrations-common>=0.1.0", "autogen-core>=0.4"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21"]

[tool.setuptools.packages.find]
where = ["."]
include = ["synap_autogen*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
