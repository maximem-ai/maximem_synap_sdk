[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap-langgraph"
version = "0.3.0"
description = "Synap memory integration for LangGraph — BaseStore + BaseCheckpointSaver"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    {name = "Synap Team"}
]
keywords = ["synap", "memory", "langgraph", "ai", "agents", "checkpointer", "store"]

dependencies = [
    "maximem-synap>=0.2.0",
    "maximem-synap-integrations-common>=0.1.0",
    "synap-langchain>=0.1.0",
    "langgraph>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["synap_langgraph*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
