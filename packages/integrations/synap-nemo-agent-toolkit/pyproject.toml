[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap-nemo-agent-toolkit"
version = "0.1.2"
description = "Synap memory plugin for NVIDIA NeMo Agent Toolkit (NAT)"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
authors = [
    {name = "Synap Team"}
]
keywords = ["synap", "memory", "nemo", "nvidia", "nat", "agents", "ai"]

dependencies = [
    "maximem-synap>=0.2.0",
    "maximem-synap-integrations-common>=0.1.0",
    "nvidia-nat-core>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.entry-points."nat.components"]
synap_memory = "synap_nemo_agent_toolkit.register"

[tool.setuptools.packages.find]
where = ["."]
include = ["synap_nemo_agent_toolkit*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
