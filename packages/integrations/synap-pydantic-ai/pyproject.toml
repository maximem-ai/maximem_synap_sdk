[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maximem-synap-pydantic-ai"
version = "0.1.4"
description = "Synap memory integration for Pydantic AI"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["maximem-synap>=0.2.0", "maximem-synap-integrations-common>=0.1.0", "pydantic-ai>=0.1"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21"]

[tool.setuptools.packages.find]
where = ["."]
include = ["synap_pydantic_ai*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
